name: Flask Backend Tests

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    paths:
      - 'flask_backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'flask_backend/**'
      - '.github/workflows/backend-tests.yml'

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('flask_backend/requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      working-directory: flask_backend
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install -r requirements-dev.txt

    - name: Type check with mypy (continue on error)
      working-directory: flask_backend
      continue-on-error: true
      run: |
        mypy api/

    - name: Run tests with pytest
      working-directory: flask_backend
      run: |
        pytest --cov=api --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.10'
      uses: codecov/codecov-action@v4
      continue-on-error: true
      with:
        file: ./flask_backend/coverage.xml
        flags: flask_backend
        name: codecov-flask
