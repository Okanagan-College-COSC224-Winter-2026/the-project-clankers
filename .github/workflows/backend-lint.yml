name: Flask Backend Lint

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flask_backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('flask_backend/requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install base deps (CI)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install flake8

      - name: Flake8 (errors only)
        run: flake8 api --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Flake8 (style report)
        run: flake8 api --exit-zero --max-line-length=120 --statistics

      - name: Import check
        run: python -c "import api; from api import create_app; app=create_app(); print('App OK')"

      - name: Byte-compile
        run: python -m compileall -q api